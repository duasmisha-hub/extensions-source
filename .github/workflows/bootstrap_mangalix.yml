      - name: Check and build
        run: ./gradlew :src:en:mangalix:spotlessCheck :src:en:mangalix:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mangalix-apk
          path: src/en/mangalix/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Commit source to fork
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- src/en/mangalix
          if git diff --cached --quiet; then
            echo "MangaLix source is already current"
            exit 0
          fi
          git commit -m "MangaLix: Add extension"
          git push origin HEAD:main
