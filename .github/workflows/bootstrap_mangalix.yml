name: Bootstrap MangaLix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bootstrap_mangalix.yml'

permissions:
  contents: write

concurrency:
  group: bootstrap-mangalix
  cancel-in-progress: false

jobs:
