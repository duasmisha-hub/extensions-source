name: Build MangaLix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/en/mangalix/**'
      - '.github/workflows/build_mangalix.yml'

permissions:
  contents: read

concurrency:
  group: build-mangalix
  cancel-in-progress: true

jobs:
  build:
    name: Build MangaLix APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

      - name: Check and build
        run: ./gradlew :src:en:mangalix:spotlessCheck :src:en:mangalix:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mangalix-apk
          path: src/en/mangalix/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
